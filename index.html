<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predecessor Stats · Split Actualizado</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'Exo 2', sans-serif;
    width: 420px;
    overflow: hidden;
    color: #e8e0d0;
  }
  #search-panel {
    background: rgba(10, 14, 20, 0.92);
    border: 1px solid rgba(180, 140, 60, 0.4);
    border-radius: 4px;
    padding: 14px 16px;
    backdrop-filter: blur(12px);
    box-shadow: 0 4px 32px rgba(0,0,0,0.7), inset 0 1px 0 rgba(180,140,60,0.15);
    position: relative;
  }
  #search-panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #b48c3c, #e8c96a, #b48c3c, transparent);
  }
  .search-row { display: flex; gap: 8px; align-items: center; }
  .game-logo {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 3px; text-transform: uppercase;
    color: #b48c3c; margin-bottom: 10px; opacity: 0.8;
  }
  input[type="text"] {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(180,140,60,0.3);
    border-radius: 3px;
    padding: 8px 12px;
    font-family: 'Exo 2', sans-serif;
    font-size: 13px; color: #e8e0d0;
    outline: none;
  }
  input[type="text"]::placeholder { color: rgba(232,224,208,0.3); }
  input[type="text"]:focus { border-color: rgba(180,140,60,0.7); }
  button {
    background: rgba(180,140,60,0.15);
    border: 1px solid rgba(180,140,60,0.5);
    border-radius: 3px;
    padding: 8px 14px;
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 700;
    letter-spacing: 1.5px; text-transform: uppercase;
    color: #e8c96a; cursor: pointer;
    transition: all 0.2s;
  }
  button:hover { background: rgba(180,140,60,0.3); border-color: #b48c3c; }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  #status-msg { font-size: 11px; color: rgba(232,224,208,0.4); margin-top: 8px; min-height: 14px; }
  #error-msg { display: none; padding: 10px 0 0; font-size: 12px; color: #e87a4a; text-align: center; letter-spacing: 0.5px; }
  
  /* FLECHA EN BORDE SUPERIOR IZQUIERDO */
  .back-arrow {
    position: absolute;
    top: 10px; left: 10px;
    width: 24px; height: 24px;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .back-arrow:hover { transform: scale(1.1); }
  .back-arrow svg {
    width: 16px; height: 16px;
    fill: rgba(180,140,60,0.7);
  }
  .back-arrow:hover svg { fill: #e8c96a; }

  #player-card { 
    display: none; 
    margin-top: 10px; 
    background: rgba(8,12,18,0.95); 
    border: 1px solid rgba(180,140,60,0.25); 
    border-radius: 4px; 
    overflow: hidden; 
    transition: all 0.4s ease; 
  }
  .card-header { display: flex; align-items: center; gap: 12px; padding: 12px 14px; background: rgba(180,140,60,0.07); border-bottom: 1px solid rgba(180,140,60,0.15); }
  .avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(180,140,60,0.2);
    border: 1.5px solid rgba(180,140,60,0.5);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 16px; font-weight: 700;
    color: #e8c96a;
    flex-shrink: 0;
  }
  .player-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 20px; font-weight: 700;
    color: #f0e8d0; letter-spacing: 0.5px; line-height: 1;
  }
  .rank-badge { font-size: 11px; color: rgba(232,224,208,0.5); letter-spacing: 1px; margin-top: 3px; display: flex; align-items: center; gap: 6px; }
  .rank-dot { width: 6px; height: 6px; border-radius: 50%; background: #b48c3c; display: inline-block; }
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); }
  .stat-cell { padding: 10px 8px; text-align: center; border-right: 1px solid rgba(180,140,60,0.1); border-bottom: 1px solid rgba(180,140,60,0.1); }
  .stat-cell:nth-child(3) { border-right: none; }
  .stat-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1.5px; color: rgba(232,224,208,0.35); margin-bottom: 4px; }
  .stat-value {
    font-family: 'Rajdhani', sans-serif;
    font-size: 18px; font-weight: 700;
    color: #e8c96a;
  }
  .stat-value.good    { color: #7ec87a; }
  .stat-value.neutral { color: #e8c96a; }
  .stat-value.warn    { color: #e87a4a; }
  .heroes-section { padding: 10px 14px 12px; border-top: 1px solid rgba(180,140,60,0.1); }
  .section-label { font-size: 9px; text-transform: uppercase; letter-spacing: 2px; color: rgba(232,224,208,0.3); margin-bottom: 8px; }
  .hero-list { display: flex; flex-direction: column; gap: 5px; }
  .hero-row { display: flex; align-items: center; gap: 8px; }
  .hero-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px; font-weight: 600;
    color: #c8b898; width: 90px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex-shrink: 0;
  }
  .hero-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.06); border-radius: 2px; overflow: hidden; }
  .hero-bar { height: 100%; border-radius: 2px; background: linear-gradient(90deg, #b48c3c, #e8c96a); transition: width 0.5s ease; }
  .hero-wr { font-size: 11px; font-weight: 600; color: #9aba90; width: 38px; text-align: right; flex-shrink: 0; }
  .hero-matches { font-size: 10px; color: rgba(232,224,208,0.3); width: 32px; text-align: right; flex-shrink: 0; }
  .recent-section { padding: 0 14px 12px; }
  .match-list { display: flex; flex-direction: column; gap: 4px; }
  .match-row { display: flex; align-items: center; gap: 8px; font-size: 11px; }
  .match-result {
    width: 26px; text-align: center;
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px; padding: 2px 0; border-radius: 2px; flex-shrink: 0;
  }
  .match-result.win  { color: #7ec87a; background: rgba(126,200,122,0.12); }
  .match-result.loss { color: #e87a4a; background: rgba(232,122,74,0.12); }
  .match-hero {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px; font-weight: 600;
    color: #c8b898; width: 80px; flex-shrink: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .match-kda { color: rgba(232,224,208,0.55); flex: 1; }
  .match-role {
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 1px; color: rgba(180,140,60,0.6);
    width: 48px; text-align: right; flex-shrink: 0;
  }
  .divider { height: 1px; background: rgba(180,140,60,0.1); margin: 0 14px; }
  .loading-dots::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } 100% { content: ''; } }
  .fade-in { animation: fadeIn 0.4s ease forwards; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  
  /* Animaciones para toggle */
  .search-hidden { display: none !important; }
  .slide-up { animation: slideUp 0.3s ease forwards; }
  .slide-down { animation: slideDown 0.3s ease forwards; }
  @keyframes slideUp { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(-20px); } }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div id="search-panel">
  <!-- FLECHA EN BORDE SUPERIOR IZQUIERDO -->
  <div class="back-arrow" id="back-arrow">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
  </div>

  <div class="game-logo">⬡ Predecessor Stats · Split Actualizado</div>
  <div class="search-row" id="search-row">
    <input type="text" id="player-input" placeholder="UUID de pred.gg..." autocomplete="off" />
    <button id="search-btn">Buscar</button>
  </div>
  <div id="status-msg"></div>
  <div id="error-msg"></div>

  <div id="player-card">
    <div class="card-header">
      <div class="avatar" id="avatar-initials">??</div>
      <div>
        <div class="player-name" id="display-name">—</div>
        <div class="rank-badge">
          <span class="rank-dot"></span>
          <span id="display-rank">—</span>
          <span style="color:rgba(232,224,208,0.2)">·</span>
          <span id="display-region">—</span>
        </div>
      </div>
      <div style="margin-left:auto; text-align:right;">
        <div style="font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#e8c96a;line-height:1;" id="display-vp">—</div>
        <div style="font-size:9px;letter-spacing:2px;color:rgba(232,224,208,0.3);text-transform:uppercase;">Puntos</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-cell">
        <div class="stat-label">Partidas</div>
        <div class="stat-value neutral" id="stat-matches">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">Winrate</div>
        <div class="stat-value" id="stat-winrate">—</div>
      </div>
      <div class="stat-cell">
        <div class="stat-label">KDA</div>
        <div class="stat-value neutral" id="stat-kda">—</div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="heroes-section">
      <div class="section-label">Héroes favoritos</div>
      <div class="hero-list" id="hero-list"></div>
    </div>

    <div class="divider"></div>

    <div class="recent-section">
      <div class="section-label" style="padding:10px 0 6px;">Últimas 5 partidas</div>
      <div class="match-list" id="match-list"></div>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://pred-proxy.wuicho395.workers.dev';
const $ = id => document.getElementById(id);

const ROLE_MAP = {
  OFFLANE: 'Offlane', JUNGLE: 'Jungle', MIDLANE: 'Mid',
  CARRY: 'Carry', SUPPORT: 'Support'
};

async function apiGet(path) {
  const res = await fetch(WORKER_URL + path, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ✅ Cargar datos (SIN MENSAJES, DIRECTO)
async function loadStats(uuid) {
  try {
    const [statsRes, matchesRes] = await Promise.all([
      apiGet(`/stats?uuid=${uuid}`),
      apiGet(`/matches?uuid=${uuid}`)
    ]);

    const player = statsRes?.data?.player;
    if (!player) throw new Error('Jugador no encontrado');

    // Datos del perfil
    const name = player.name || 'Desconocido';
    const region = (player.favRegion || '—')
      .replace('NA', 'NA').replace('NA_EAST', 'NA East')
      .replace('NA_WEST', 'NA West').replace('EUROPE', 'Europe')
      .replace('OCE', 'Oceania').replace('SA', 'Latam');

    const lastRating = player.ratings?.[player.ratings.length - 1] || {};
    const rank = lastRating.rank?.name || lastRating.rank?.tierName || '—';
    const vp = lastRating.points || 0;

    $('display-name').textContent = name;
    $('avatar-initials').textContent = name.slice(0,2).toUpperCase();
    $('display-rank').textContent = rank;
    $('display-region').textContent = region;
    $('display-vp').textContent = vp.toLocaleString();

    // Stats recientes (últimas 5 partidas)
    const matchesData = matchesRes?.data?.player?.matchesPaginated?.results || [];
    let wins = 0, losses = 0, k = 0, d = 0, a = 0;
    matchesData.forEach(m => {
      const me = m.matchPlayers?.[0] || {};
      if (m.match?.winningTeam === (me.team || 0)) wins++;
      else losses++;
      k += me.kills || 0; d += me.deaths || 0; a += me.assists || 0;
    });

    const totalMatches = wins + losses;
    const wr = totalMatches > 0 ? (wins / totalMatches * 100).toFixed(1) : 0;
    const kda = d > 0 ? ((k + a) / d).toFixed(2) : '0.00';

    const matchCount = matchesData.length > 0 ? 5 : 0;
    $('stat-matches').textContent = matchCount.toLocaleString();
    $('stat-winrate').textContent = wr + '%';
    $('stat-winrate').className = 'stat-value ' + (wr >= 55 ? 'good' : wr >= 45 ? 'neutral' : 'warn');
    $('stat-kda').textContent = kda;
    $('stat-kda').className = 'stat-value ' + (parseFloat(kda) >= 3 ? 'good' : parseFloat(kda) >= 1.5 ? 'neutral' : 'warn');

    // Héroes favoritos
    const heroList = $('hero-list');
    heroList.innerHTML = '';
    if (matchesData.length === 0) {
      heroList.innerHTML = '<div style="font-size:11px;color:rgba(232,224,208,0.25);">Sin datos</div>';
    } else {
      const heroCounts = {};
      matchesData.forEach(m => {
        const hero = m.matchPlayers?.[0]?.hero?.data?.displayName || 'Héroe';
        heroCounts[hero] = (heroCounts[hero] || 0) + 1;
      });
      const sortedHeroes = Object.entries(heroCounts)
        .sort((a,b) => b[1] - a[1])
        .slice(0,4);
      const maxGames = sortedHeroes[0]?.[1] || 1;
      sortedHeroes.forEach(([name, count]) => {
        const barW = Math.round((count / maxGames) * 100);
        heroList.innerHTML += `
          <div class="hero-row">
            <div class="hero-name">${name}</div>
            <div class="hero-bar-wrap" style="flex:1">
              <div class="hero-bar" style="width:${barW}%"></div>
            </div>
            <div class="hero-wr">${count}p</div>
          </div>`;
      });
    }

    // Últimas 5 partidas
    const matchList = $('match-list');
    matchList.innerHTML = '';
    if (matchesData.length === 0) {
      matchList.innerHTML = '<div style="font-size:11px;color:rgba(232,224,208,0.25);">Sin partidas</div>';
    } else {
      matchesData.slice(0,5).forEach(m => {
        const match = m.match || {};
        const me = m.matchPlayers?.[0] || {};
        const won = match.winningTeam === (me.team || 0);
        const hero = me.hero?.data?.displayName || '—';
        const k_ = me.kills||0, d_ = me.deaths||0, a_ = me.assists||0;
        matchList.innerHTML += `
          <div class="match-row">
            <div class="match-result ${won?'win':'loss'}">${won?'V':'D'}</div>
            <div class="match-hero">${hero}</div>
            <div class="match-kda">${k_}/${d_}/${a_}</div>
            <div class="match-role">—</div>
          </div>`;
      });
    }

    // Guardar UUID
    localStorage.setItem('lastUUID', uuid);

  } catch (e) {
    console.warn("Error:", e);
  }
}

// ✅ Buscar jugador (MUESTRA TARJETA INMEDIATAMENTE)
async function searchPlayer() {
  const input = $('player-input').value.trim();
  if (!input) return;

  try {
    const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(input);
    if (!isUUID) throw new Error('Solo se permite UUID. Copia tu UUID de pred.gg.');

    const uuid = input;
    await loadStats(uuid);
    
    // ✅ MOSTRAR TARJETA INMEDIATAMENTE (sin animaciones complejas)
    $('search-row').style.display = 'none';
    const card = $('player-card');
    card.style.display = 'block';
    
  } catch (e) {
    $('error-msg').textContent = '✕ ' + e.message.slice(0, 100);
    $('error-msg').style.display = 'block';
  }
}

// ✅ Volver al buscador (MUESTRA BÚSQUEDA INMEDIATAMENTE)
function resetSearch() {
  $('player-card').style.display = 'none';
  $('search-row').style.display = 'flex';
  $('player-input').value = '';
  $('player-input').focus();
  $('error-msg').style.display = 'none';
  $('status-msg').textContent = '';
}

// ✅ Auto-carga al inicio (SIN RETRASOS)
window.onload = () => {
  const savedUUID = localStorage.getItem('lastUUID');
  
  if (savedUUID && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(savedUUID)) {
    // Auto-cargar SILENCIOSAMENTE (sin animaciones para evitar retrasos)
    $('search-row').style.display = 'none';
    $('player-card').style.display = 'block';
    
    // Cargar datos
    loadStats(savedUUID);
    
    // Auto-refrescar cada 15s
    setInterval(() => {
      loadStats(savedUUID);
    }, 15000);
  } else {
    // Si no hay UUID, no hacer nada (ya está visible el buscador)
  }
};

// Eventos
document.getElementById('search-btn').onclick = searchPlayer;
document.getElementById('player-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchPlayer();
});
document.getElementById('back-arrow').onclick = resetSearch;
</script>
</body>
</html>
