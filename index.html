<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Predecessor Stats · Split Actualizado</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  /* [MANTENER TODO EL ESTILO COMO ESTÁ, SOLO CAMBIA EL JS] */
</style>
</head>
<body>

<div id="search-panel">
  <div class="game-logo">⬡ Predecessor Stats · Split Actualizado</div>
  <div class="search-row" id="search-row">
    <input type="text" id="player-input" placeholder="UUID de pred.gg..." autocomplete="off" />
    <button id="search-btn">Buscar</button>
  </div>
  <div id="status-msg"></div>
  <div id="error-msg"></div>

  <div id="player-card">
    <!-- [MANTENER TODO EL HTML DE TARJETA COMO ESTÁ] -->
  </div>
</div>

<script>
const WORKER_URL = 'https://pred-proxy.wuicho395.workers.dev';
const $ = id => document.getElementById(id);

const ROLE_MAP = {
  OFFLANE: 'Offlane', JUNGLE: 'Jungle', MIDLANE: 'Mid',
  CARRY: 'Carry', SUPPORT: 'Support'
};

async function apiGet(path) {
  const res = await fetch(WORKER_URL + path, { headers: { 'Accept': 'application/json' } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ✅ FUNCIONES DE CARGA Y ACTUALIZACIÓN
async function loadStats(uuid, showPop = false) {
  const btn = $('search-btn');
  const status = $('status-msg');
  const card = $('player-card');
  const err = $('error-msg');

  btn.disabled = true;
  err.style.display = 'none';
  status.innerHTML = showPop ? '<span class="loading-dots">Cargando datos actualizados</span>' : '<span class="loading-dots">Actualizando...</span>';

  try {
    const [statsRes, matchesRes] = await Promise.all([
      apiGet(`/stats?uuid=${uuid}`),
      apiGet(`/matches?uuid=${uuid}`)
    ]);

    const player = statsRes?.data?.player;
    if (!player) throw new Error('Jugador no encontrado — revisa el UUID');

    // Datos actuales (ratings como array)
    const name = player.name || 'Desconocido';
    const region = (player.favRegion || '—')
      .replace('NA', 'NA').replace('NA_EAST', 'NA East')
      .replace('NA_WEST', 'NA West').replace('EUROPE', 'Europe')
      .replace('OCE', 'Oceania').replace('SA', 'Latam');

    const lastRating = player.ratings?.[player.ratings.length - 1] || {};
    const rank = lastRating.rank?.name || lastRating.rank?.tierName || '—';
    const vp = lastRating.points || 0;

    $('display-name').textContent = name;
    $('avatar-initials').textContent = name.slice(0,2).toUpperCase();
    $('display-rank').textContent = rank;
    $('display-region').textContent = region;
    $('display-vp').textContent = vp.toLocaleString();

    // Stats recientes (últimas 5 partidas)
    const matchesData = matchesRes?.data?.player?.matchesPaginated?.results || [];
    let wins = 0, losses = 0, k = 0, d = 0, a = 0;
    matchesData.forEach(m => {
      const me = m.matchPlayers?.[0] || {};
      if (m.match?.winningTeam === (me.team || 0)) wins++;
      else losses++;
      k += me.kills || 0; d += me.deaths || 0; a += me.assists || 0;
    });

    const totalMatches = wins + losses;
    const wr = totalMatches > 0 ? (wins / totalMatches * 100).toFixed(1) : 0;
    const kda = d > 0 ? ((k + a) / d).toFixed(2) : '0.00';

    const matchCount = matchesData.length > 0 ? 5 : 0;
    $('stat-matches').textContent = matchCount.toLocaleString();

    $('stat-winrate').textContent = wr + '%';
    $('stat-winrate').className = 'stat-value ' + (wr >= 55 ? 'good' : wr >= 45 ? 'neutral' : 'warn');

    $('stat-kda').textContent = kda;
    $('stat-kda').className = 'stat-value ' + (parseFloat(kda) >= 3 ? 'good' : parseFloat(kda) >= 1.5 ? 'neutral' : 'warn');

    // Héroes favoritos (últimas 5 partidas)
    const heroList = $('hero-list');
    heroList.innerHTML = '';
    if (matchesData.length === 0) {
      heroList.innerHTML = '<div style="font-size:11px;color:rgba(232,224,208,0.25);">Sin datos</div>';
    } else {
      const heroCounts = {};
      matchesData.forEach(m => {
        const hero = m.matchPlayers?.[0]?.hero?.data?.displayName || 'Héroe';
        heroCounts[hero] = (heroCounts[hero] || 0) + 1;
      });
      const sortedHeroes = Object.entries(heroCounts)
        .sort((a,b) => b[1] - a[1])
        .slice(0,4);

      const maxGames = sortedHeroes[0]?.[1] || 1;
      sortedHeroes.forEach(([name, count]) => {
        const barW = Math.round((count / maxGames) * 100);
        heroList.innerHTML += `
          <div class="hero-row">
            <div class="hero-name">${name}</div>
            <div class="hero-bar-wrap" style="flex:1">
              <div class="hero-bar" style="width:${barW}%"></div>
            </div>
            <div class="hero-wr">${count}p</div>
          </div>`;
      });
    }

    // Últimas 5 partidas
    const matchList = $('match-list');
    matchList.innerHTML = '';
    if (matchesData.length === 0) {
      matchList.innerHTML = '<div style="font-size:11px;color:rgba(232,224,208,0.25);">Sin partidas</div>';
    } else {
      matchesData.slice(0,5).forEach(m => {
        const match = m.match || {};
        const me = m.matchPlayers?.[0] || {};
        const won = match.winningTeam === (me.team || 0);
        const hero = me.hero?.data?.displayName || '—';
        const k_ = me.kills||0, d_ = me.deaths||0, a_ = me.assists||0;
        matchList.innerHTML += `
          <div class="match-row">
            <div class="match-result ${won?'win':'loss'}">${won?'V':'D'}</div>
            <div class="match-hero">${hero}</div>
            <div class="match-kda">${k_}/${d_}/${a_}</div>
            <div class="match-role">—</div>
          </div>`;
      });
    }

    status.textContent = '';
    if (showPop) {
      card.classList.remove('pop-in');
      void card.offsetWidth;
      card.classList.add('pop-in');
    }

  } catch (e) {
    status.textContent = '';
    err.style.display = 'block';
    err.textContent = '✕ ' + e.message.slice(0, 100);
  } finally {
    btn.disabled = false;
  }
}

// ✅ FUNCIÓN PRINCIPAL: buscar jugador
async function searchPlayer() {
  const input = $('player-input').value.trim();
  if (!input) return;

  try {
    const isUUID = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(input);
    if (!isUUID) throw new Error('Solo se permite UUID. Copia tu UUID de pred.gg.');

    const uuid = input;
    await loadStats(uuid, true);
  } catch (e) {
    $('status-msg').textContent = '';
    $('error-msg').style.display = 'block';
    $('error-msg').textContent = '✕ ' + e.message.slice(0, 100);
  }
}

// ✅ ACTUALIZACIÓN AUTOMÁTICA (cada 15 segundos)
let refreshInterval = null;

// ✅ Iniciar: Si hay un UUID guardado, cargarlo; si no, mostrar buscador
window.onload = () => {
  const savedUUID = localStorage.getItem('lastUUID');
  
  if (savedUUID && /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(savedUUID)) {
    // Si hay UUID guardado, cargarlo automáticamente
    loadStats(savedUUID);
    // Ocultar buscador
    $('search-row').classList.add('search-hidden');
    $('search-row').style.display = 'none';
    // Mostrar tarjeta con pop-in
    const card = $('player-card');
    card.style.display = 'block';
    card.classList.add('pop-in');
    
    // Iniciar auto-actualización
    if (refreshInterval) clearInterval(refreshInterval);
    refreshInterval = setInterval(async () => {
      try {
        await loadStats(savedUUID);
      } catch (e) {
        console.warn("Refresco fallido:", e);
      }
    }, 15000);
  } else {
    // Si no hay UUID, mostrar buscador
    $('player-card').style.display = 'none';
  }
};

// Eventos
document.getElementById('search-btn').onclick = searchPlayer;
document.getElementById('player-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') searchPlayer();
});
</script>
</body>
</html>
